services:
  - type: worker
    name: tecxo-ads-bot
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: LOGS_BOT_TOKEN
        sync: false
      - key: ADMINS
        sync: false
      - key: MAX_ACCOUNTS
        value: "5"
